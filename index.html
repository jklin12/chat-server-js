<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp API Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Glassmorphism Panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    }

    /* Gradient Text */
    .text-gradient {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Animasi Pulsing QR Placeholder */
    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }

    .qr-placeholder {
      animation: pulse-ring 2s infinite;
    }

    /* Custom Scrollbar for Logs */
    #logs-container::-webkit-scrollbar {
      width: 6px;
    }

    #logs-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #logs-container::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    #logs-container::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .log-item {
      animation: slideIn 0.3s ease-out forwards;
      opacity: 0;
      transform: translateX(-10px);
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-3">
          <!-- WhatsApp Icon SVG -->
          <svg class="h-8 w-8 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.666.596 1.216.78 1.392.868.176.086.279.072.381-.044.104-.117.447-.521.567-.701.119-.18.239-.149.4-.087.161.062 1.018.479 1.192.566.173.087.289.145.332.226.043.081.043.465-.101.87z"
              fill-rule="evenodd" />
          </svg>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
            WhatsApp API
          </span>
        </div>
        <div class="hidden sm:flex items-center gap-2">
          <span class="relative flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
          </span>
          <span class="text-sm font-medium text-gray-600">Server Active</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto px-4 py-8 lg:py-12 max-w-6xl">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- Left Column: QR Code Section -->
      <div class="lg:col-span-5 flex flex-col items-center justify-center">
        <div
          class="glass-panel rounded-2xl p-8 w-full max-w-md text-center transform transition-all hover:scale-[1.01]">
          <h2 class="text-2xl font-bold text-gray-800 mb-2">Device Authentication</h2>
          <p class="text-gray-500 text-sm mb-8">Scan the QR code below using your WhatsApp app to link this device.</p>

          <!-- QR Box -->
          <div
            class="relative w-64 h-64 mx-auto bg-white rounded-xl shadow-inner flex items-center justify-center border-2 border-dashed border-emerald-200 overflow-hidden group">
            <!-- Loading spinner / Placeholder sebelum QR Muncul -->
            <div id="qr-placeholder"
              class="absolute inset-0 flex flex-col items-center justify-center text-emerald-500 bg-white z-10 qr-placeholder rounded-xl transition-opacity duration-500">
              <svg class="animate-spin h-10 w-10 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              <span class="text-sm font-medium">Generating QR...</span>
            </div>

            <!-- Actual QR Code Image -->
            <img id="qrcode" class="w-full h-full object-contain p-2 opacity-0 transition-opacity duration-500 z-20"
              src="" alt="WhatsApp QR Code">
          </div>

          <div
            class="mt-8 flex items-center justify-center gap-2 text-sm text-gray-600 bg-emerald-50 py-2 px-4 rounded-full inline-flex">
            <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Waiting for scan...</span>
          </div>
        </div>
      </div>

      <!-- Right Column: Logs Section -->
      <div class="lg:col-span-7 flex flex-col h-[600px]">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden">
          <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
              </svg>
              <h3 class="font-semibold text-gray-700">System Logs</h3>
            </div>
            <button id="clear-logs"
              class="text-xs font-medium text-gray-500 hover:text-emerald-600 transition-colors bg-white px-3 py-1.5 rounded-md border border-gray-200 hover:border-emerald-200">
              Clear Logs
            </button>
          </div>

          <div class="flex-grow p-6 overflow-y-auto bg-gray-900" id="logs-container">
            <ul id="logs" class="space-y-3 font-mono text-sm">
              <!-- Logs will be appended here -->
            </ul>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-gray-500">
        &copy;
        <script>document.write(new Date().getFullYear())</script> WhatsApp API Server. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    $(document).ready(function () {
      var socket = io();
      var logsEl = $("#logs");
      var logsContainer = $("#logs-container");
      var qrPlaceholder = $("#qr-placeholder");
      var qrImg = $("#qrcode");

      // Format timestamp
      function getTimeStamp() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }

      // Function to add log with styling
      function addLog(msg, type = 'info') {
        let colorClass = 'text-green-400'; // default info color
        let icon = '▶';

        if (msg.toLowerCase().includes('disconnected') || msg.toLowerCase().includes('failure')) {
          colorClass = 'text-red-400';
          icon = '✖';
        } else if (msg.toLowerCase().includes('authenticated')) {
          colorClass = 'text-emerald-400';
          icon = '✔';
          // Sembunyikan QR jika sudah auth
          qrImg.css('opacity', '0');
          qrPlaceholder.html(`
                        <svg class="w-12 h-12 text-emerald-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-sm font-medium text-emerald-600">Connected!</span>
                    `).css('opacity', '1');
        } else if (msg.toLowerCase().includes('qr code received')) {
          colorClass = 'text-yellow-400';
          icon = '⟳';
        }

        // Hapus tulisan timestamp default dari server jika ada, agar kita pakai yang UI saja
        const cleanMsg = msg.replace(/^\d{1,2}\/\d{1,2}\/\d{4}, \d{1,2}:\d{2}:\d{2} [AP]M /, '');

        const logItem = `
                    <li class="log-item flex gap-3 text-gray-300">
                        <span class="text-gray-500 shrink-0">[${getTimeStamp()}]</span>
                        <span class="${colorClass} shrink-0">${icon}</span>
                        <span class="break-words">${cleanMsg}</span>
                    </li>
                `;

        logsEl.append(logItem);

        // Auto scroll to bottom
        logsContainer.scrollTop(logsContainer[0].scrollHeight);
      }

      socket.on('message', function (msg) {
        addLog(msg);
      });

      socket.on('qr', function (qr) {
        qrImg.attr("src", qr);
        qrImg.css('opacity', '1');
        qrPlaceholder.css('opacity', '0');
      });

      // Clear logs button
      $("#clear-logs").click(function () {
        logsEl.empty();
        addLog('Logs cleared by user.', 'info');
      });
    });
  </script>
</body>

</html>
